                                                                <td className="px-4 py-3"><span className="bg-slate-100 font-bold px-2 py-1 rounded">{item.size}</span></td>
                                                                <td className="px-4 py-3">{item.quantity}</td>
                                                                <td className="px-4 py-3 text-slate-500 text-xs flex items-center gap-1 mt-1.5"><CalendarIcon size={12} /> {item.assignedAt.split(' ')[0]}</td>
                                                                <td className="px-4 py-3 text-right">
                                                                    <button onClick={() => openEditUniform(item)} className="text-blue-500 hover:bg-blue-50 p-1.5 rounded mr-1" title="Editar Peça"><EditIcon size={16} /></button>
                                                                    <button onClick={() => handleRemoveUniform(item.id)} className="text-red-500 hover:bg-red-50 p-1.5 rounded" title="Devolver/Dar Baixa"><TrashIcon size={16} /></button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ) : (
                                            <div className="text-center py-10 bg-white rounded-xl border border-slate-200 text-slate-400">
                                                <ShirtIcon size={40} className="mx-auto mb-2 opacity-30" /> Nenhum fardamento vinculado.
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="px-6 py-4 border-t border-slate-100 bg-white rounded-b-2xl flex justify-between items-center">
                                    <button onClick={() => handleDeleteEmployee(managingEmployee.id)} className="text-red-500 hover:text-red-700 text-sm font-bold flex items-center gap-1.5">
                                        <TrashIcon size={16} /> Excluir Colaborador
                                    </button>
                                    <button onClick={() => {setManagingEmployee(null); setIsAddingUniform(false);}} className="px-6 py-2.5 bg-slate-900 text-white rounded-xl text-sm font-bold">Concluir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Editar Peça do Empregado */}
                    {editingUniform && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up border border-slate-200">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-blue-50">
                                    <h3 className="font-bold text-blue-900 flex items-center gap-2"><EditIcon size={20} className="text-blue-600" /> Editar Peça Entregue</h3>
                                    <button onClick={() => setEditingUniform(null)} className="text-blue-400 hover:text-blue-600 bg-white rounded-full p-1 transition-colors"><XIcon size={20} /></button>
                                </div>
                                <form onSubmit={handleSaveUniformEdit}>
                                    <div className="p-6 space-y-4">
                                        <div className="flex-1 w-full">
                                            <label className="block text-sm font-bold text-slate-700 mb-1">Tipo de Peça</label>
                                            <select className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white" value={editUniData.type} onChange={(e) => setEditUniData({...editUniData, type: e.target.value})}>
                                                {uniformTypes.map(type => <option key={type}>{type}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-4">
                                            <div className="w-1/2">
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Tamanho/Nº</label>
                                                <input type="text" required className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500" value={editUniData.size} onChange={(e) => setEditUniData({...editUniData, size: e.target.value})} />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Quantidade</label>
                                                <input type="number" min="1" required className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500" value={editUniData.quantity} onChange={(e) => setEditUniData({...editUniData, quantity: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 mt-2">
                                            <p className="text-xs text-amber-800 flex items-center gap-2">
                                                <AlertTriangleIcon size={14} className="flex-shrink-0" />
                                                O estoque será ajustado automaticamente após salvar as alterações.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                                        <button type="button" onClick={() => setEditingUniform(null)} className="px-5 py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl text-sm font-bold transition-colors">Cancelar</button>
                                        <button type="submit" disabled={!editUniData.size.trim()} className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold transition-colors">Salvar Alterações</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlmoxarifadoApp />);
    </script>
</body>
</html>
